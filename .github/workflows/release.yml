name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build archive
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o dist/gnocchi-proxy-api-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/gnocchi-proxy-api
          tar -czf dist/gnocchi-proxy-api-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz -C dist gnocchi-proxy-api-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/gnocchi-proxy-api-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz

  image:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/gnocchi-proxy-api:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/gnocchi-proxy-api:latest
