replicaCount: 1

image:
  repository: ghcr.io/vexxhost/gnocchi-proxy-api
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: atmosphere
  annotations:
    cert-manager.io/cluster-issuer: atmosphere
    cert-manager.io/common-name: gnocchi.example.com
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
  hosts:
    - host: gnocchi.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - gnocchi.example.com
      secretName: gnocchi-api-certs

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector:
  openstack-control-plane: enabled
tolerations: []
affinity: {}

serviceMonitor:
  enabled: false
  namespace: ""
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

config:
  server:
    address: ":8080"
    read_timeout: 15s
    write_timeout: 15s
    idle_timeout: 60s
    shutdown_timeout: 10s
  keystone:
    auth_url: "http://keystone-api:5000"
    username: ""
    password: ""
    project_name: "service"
    user_domain_name: "service"
    project_domain_name: "service"
    insecure_skip_verify: false
    admin_roles:
      - "admin"
    service_token_skew: 30s
  prometheus:
    base_url: "http://kube-prometheus-stack-prometheus.monitoring:9090"
    query_timeout: 30s
    headers: {}
    libvirt_selector: 'job="monitoring/libvirt-exporter"'
    database_selector: 'job="openstack-exporter"'
  catalog:
    refresh_interval: 60s
  api:
    supported_granularities:
      - "60s"
      - "300s"
      - "3600s"
      - "W"
    supported_aggregations:
      - "mean"
      - "min"
      - "max"
      - "sum"
      - "last"
      - "count"
    default_granularity: "60s"
    default_aggregation: "mean"
